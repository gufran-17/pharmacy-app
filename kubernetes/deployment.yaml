# kubernetes/deployment.yaml
# Contains ONLY: Namespace + Deployment
# Secret is created manually via CLI — never in Git

apiVersion: v1
kind: Namespace
metadata:
  name: pharmacy

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmacy-app
  namespace: pharmacy
  labels:
    app: pharmacy-app
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: pharmacy-app        # ← locked forever after first apply

  template:
    metadata:
      labels:
        app: pharmacy-app      # ← must match selector above exactly

    spec:
      containers:
      - name: pharmacy
        image: PLACEHOLDER
        imagePullPolicy: Always
        ports:
        - containerPort: 80

        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: pharmacy-db-secret
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: pharmacy-db-secret
              key: DB_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: pharmacy-db-secret
              key: DB_PASS
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: pharmacy-db-secret
              key: DB_NAME

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 6

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10