apiVersion: v1
kind: Namespace
metadata:
  name: pharmacy

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmacy-app
  namespace: pharmacy
  labels:
    app: pharmacy-app
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: pharmacy-app

  template:
    metadata:
      labels:
        app: pharmacy-app

    spec:
      containers:
      - name: pharmacy
        image: PLACEHOLDER
        imagePullPolicy: Always
        ports:
        - containerPort: 80

        # FIX: Memory limits prevent OOM kill (Exit Code 137)
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"

        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: pharmacy-db-secret
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: pharmacy-db-secret
              key: DB_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: pharmacy-db-secret
              key: DB_PASS
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: pharmacy-db-secret
              key: DB_NAME

        # FIX: Use healthcheck.php — no DB, always fast, always 200
        readinessProbe:
          httpGet:
            path: /healthcheck.php
            port: 80
          initialDelaySeconds: 15   # give Apache time to fully start
          periodSeconds: 5
          failureThreshold: 6
          timeoutSeconds: 3         # was 1s — too tight for any real response

        livenessProbe:
          httpGet:
            path: /healthcheck.php
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 3